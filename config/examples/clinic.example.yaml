# InteliClinic — Configuração de Deploy por Clínica
# =====================================================
# Este arquivo é um TEMPLATE. Copie para clinic.yaml e preencha os valores reais.
# NUNCA commite clinic.yaml no repositório — contém dados sensíveis.
#
# A maioria das configurações pode vir de variáveis de ambiente (prefixo CLINIC_).
# Use este arquivo para configurações mais ricas (listas, textos multilinha, etc.)
#
# Referência: src/inteliclinic/clinic/config/clinic_settings.py

# ------------------------------------------------------------------
# Identidade da clínica
# Estes valores identificam ESTA instância do InteliClinic.
# ------------------------------------------------------------------
identity:
  id: "clinica_exemplo_sp"          # Único, lowercase, sem espaços (ex: clinica_saude_sp)
  name: "Clínica Exemplo Saúde"     # Nome legal completo
  short_name: "Clínica Exemplo"     # Nome curto para o chatbot
  cnpj: "00.000.000/0001-00"
  domain: "bot.clinicaexemplo.com.br"
  timezone: "America/Sao_Paulo"
  language: "pt-BR"

contact:
  phone: "(11) 0000-0000"
  address: "Rua Exemplo, 123, Sala 45"
  city: "São Paulo"
  state: "SP"
  email: "contato@clinicaexemplo.com.br"

# ------------------------------------------------------------------
# Branding do chatbot
# ------------------------------------------------------------------
branding:
  chatbot_name: "Ana"
  chatbot_greeting: "Olá! Sou a Ana, assistente virtual da {clinic_name}. Como posso ajudá-lo?"
  primary_color: "#0066CC"
  logo_path: "src/inteliclinic/clinic/branding/logo.png"  # Opcional

# ------------------------------------------------------------------
# Features habilitadas para esta clínica
# Habilite apenas o que for necessário e testado.
# ------------------------------------------------------------------
features:
  scheduling: true            # Agendamento via chatbot
  insurance_query: true       # Consulta de cobertura de convênios
  financial: false            # Consultas financeiras / preços
  glosa_detection: false      # Detecção interna de glosas (requer dados históricos)
  voice: false                # Canal de voz (LiveKit — Phase 2)
  graphrag: false             # Knowledge graph (Phase 2)

# ------------------------------------------------------------------
# Configuração de IA / LLM
# ------------------------------------------------------------------
ai:
  llm_provider: "openai"           # openai | anthropic | gemini
  llm_model: "gpt-4o-mini"        # Modelo a usar (override)
  min_confidence: 0.65             # Confiança mínima antes do fallback
  max_turns: 20                    # Máximo de turnos antes de forçar handoff
  # supervisor_threshold: 0.50     # Confiança para acionar supervisor (default: 0.50)

# ------------------------------------------------------------------
# RAG — knowledge base desta clínica
# A engine é global. A base indexada é LOCAL desta clínica.
# ------------------------------------------------------------------
rag:
  qdrant_url: "http://localhost:6333"
  # collection_name é derivado automaticamente de: inteliclinic_{clinic_id}
  top_k: 5                          # Resultados a recuperar por query
  min_score: 0.70                   # Score mínimo de similaridade
  chunk_size: 800                   # Tamanho alvo dos chunks (chars)
  chunk_overlap: 64                 # Sobreposição entre chunks
  chunker_strategy: "semantic"      # semantic | fixed
  ocr_enabled: true                 # Habilitar OCR em PDFs escaneados

# ------------------------------------------------------------------
# Horários de atendimento
# ------------------------------------------------------------------
business_hours:
  start: "08:00"
  end: "18:00"
  days: [1, 2, 3, 4, 5]          # 0=Dom, 1=Seg, ..., 6=Sáb
  after_hours_message: >
    Nosso atendimento funciona de segunda a sexta, das 08h às 18h.
    Deixe sua mensagem e retornaremos em breve. Para urgências médicas, ligue 192 (SAMU).

# ------------------------------------------------------------------
# Convênios e planos de saúde
# ------------------------------------------------------------------
insurance:
  accepted:
    - "Unimed Nacional"
    - "Unimed São Paulo"
    - "Bradesco Saúde"
    - "Amil"
    - "SulAmérica"
    - "Porto Seguro Saúde"
  accepts_private: true
  # insurance_notes é injetado no system prompt do chatbot
  insurance_notes: >
    Unimed: consulta sem necessidade de guia para procedimentos de rotina.
    Bradesco: exames complexos requerem autorização prévia da operadora.
    Amil: apresentar carteirinha física ou digital no dia da consulta.

# ------------------------------------------------------------------
# Prompts complementares (adicionados ao system prompt do core)
# Não substituem as instruções de segurança — apenas complementam.
# ------------------------------------------------------------------
prompts:
  tone: "professional"              # formal | professional | friendly

  specialty_context: >
    Esta clínica é especializada em ortopedia, fisioterapia e medicina esportiva.
    Atendemos todas as idades. Temos reabilitação pós-operatória e tratamento de lesões esportivas.

  additional_rules:
    - "Para agendamentos de urgência ortopédica, sempre verificar disponibilidade do Dr. Silva."
    - "Procedimentos acima de R$ 800 requerem confirmação por ligação da recepção."
    - "Não agendar mais de 3 sessões de fisioterapia por semana para o mesmo paciente sem autorização."

  proactive_info: >
    Estamos com disponibilidade para ortopedia na próxima semana.
    Exames de imagem (raio-X e ressonância) são realizados aqui mesmo, sem encaminhamento.

# ------------------------------------------------------------------
# Profissionais (para seed inicial — não é fonte de verdade em produção)
# Em produção, profissionais são gerenciados via API.
# ------------------------------------------------------------------
professionals_seed:
  - name: "Dr. Carlos Silva"
    crm: "CRM-SP 123456"
    specialty: "Ortopedia"
    consultation_duration_min: 30
    schedule:
      days: [1, 2, 3, 4, 5]
      start: "08:00"
      end: "17:00"

  - name: "Dra. Maria Lima"
    crm: "CREFITO-SP 67890"
    specialty: "Fisioterapia"
    consultation_duration_min: 45
    schedule:
      days: [1, 2, 3, 4, 5]
      start: "09:00"
      end: "18:00"

  - name: "Dr. Pedro Alves"
    crm: "CRM-SP 234567"
    specialty: "Medicina Esportiva"
    consultation_duration_min: 40
    schedule:
      days: [1, 3, 5]
      start: "14:00"
      end: "19:00"

# ------------------------------------------------------------------
# Documentos da knowledge base (para ingestão inicial)
# Coloque os arquivos em src/inteliclinic/clinic/knowledge/
# ------------------------------------------------------------------
knowledge_docs:
  - path: "convenio_unimed.pdf"
    type: "insurance"
    description: "Tabela de cobertura Unimed"
  - path: "convenio_bradesco.pdf"
    type: "insurance"
    description: "Tabela de cobertura Bradesco Saúde"
  - path: "faq_clinica.md"
    type: "faq"
    description: "Perguntas frequentes dos pacientes"
  - path: "tabela_particular.pdf"
    type: "pricing"
    description: "Tabela de preços particulares"
  - path: "protocolo_pos_cirurgico.pdf"
    type: "protocol"
    description: "Protocolo pós-operatório de ortopedia"
