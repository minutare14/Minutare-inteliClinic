services:
  db:
    image: pgvector/pgvector:pg16
    container_name: minutare-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minutare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minutare}
      POSTGRES_DB: ${POSTGRES_DB:-minutare_med}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minutare -d minutare_med"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: minutare-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-minutare}:${POSTGRES_PASSWORD:-minutare}@db:5432/${POSTGRES_DB:-minutare_med}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../../apps/api/app:/app/app
      - ../../apps/api/alembic:/app/alembic
      - ../../apps/api/alembic.ini:/app/alembic.ini
      - ../../scripts:/app/scripts
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_data.py --mode db --database-url postgresql+asyncpg://${POSTGRES_USER:-minutare}:${POSTGRES_PASSWORD:-minutare}@db:5432/${POSTGRES_DB:-minutare_med} &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  pgdata:
