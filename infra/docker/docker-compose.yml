# docker-compose.yml — Desenvolvimento Local
# ===========================================
# Use este arquivo apenas em ambiente local.
# Para produção (Dokploy), use o docker-compose.yml na raiz do projeto.
#
# Comandos:
#   cd infra/docker
#   cp .env.example .env   (editar .env com suas chaves)
#   docker compose up --build

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: minutare-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minutare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minutare}
      POSTGRES_DB: ${POSTGRES_DB:-minutare_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minutare} -d ${POSTGRES_DB:-minutare_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: minutare-qdrant-dev
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q 'ok' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: ../../         # raiz do projeto (inclui scripts/)
      dockerfile: apps/api/Dockerfile
    container_name: minutare-api-dev
    env_file: .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-minutare}:${POSTGRES_PASSWORD:-minutare}@db:5432/${POSTGRES_DB:-minutare_dev}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      # Live reload — monta código local sobre a imagem
      - ../../apps/api/app:/app/app
      - ../../apps/api/alembic:/app/alembic
      - ../../scripts:/app/scripts
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/seed_data.py --mode db --database-url 'postgresql+asyncpg://${POSTGRES_USER:-minutare}:${POSTGRES_PASSWORD:-minutare}@db:5432/${POSTGRES_DB:-minutare_dev}' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
      "
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
